name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  # ── Backend: Django tests + migration check ──────────────────────────────
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    env:
      SECRET_KEY: "ci-only-insecure-secret-key-do-not-use-in-production"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
      # DEBUG=true keeps the production-only security block (SECURE_SSL_REDIRECT)
      # in settings.py disabled. With DEBUG=False, SECURE_SSL_REDIRECT=True makes
      # the Django test client receive 301 redirects, breaking ~48 view/API tests.
      DEBUG: "true"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        # Exits non-zero if model changes exist without a corresponding migration file.
        # Does not need a DB connection — reads model code and migration files only.
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test events --verbosity=2

  # ── Frontend: type-check + production build ──────────────────────────────
  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm --filter frontend check

      - name: Build
        run: pnpm --filter frontend build
