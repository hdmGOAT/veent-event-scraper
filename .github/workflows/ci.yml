name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  # ── Backend: Django tests + migration check ──────────────────────────────
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    env:
      # Hardcoded insecure key — safe for CI, never used in production
      SECRET_KEY: "ci-only-insecure-secret-key-do-not-use-in-production"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for missing migrations
        # Exits non-zero if model changes exist without a corresponding migration file.
        # Does not need a DB connection — reads model code and migration files only.
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test events --verbosity=2 --keepdb
        env:
          # Required: set DATABASE_URL in repo → Settings → Secrets → Actions.
          # Tests use a real Neon Postgres DB; SQLite fallback breaks TransactionTestCase.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Frontend: type-check + production build ──────────────────────────────
  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm --filter frontend check

      - name: Build
        run: pnpm --filter frontend build
