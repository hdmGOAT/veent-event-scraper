{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Veent Events{% endblock %}</title>
  <style>
    :root { --bg:#0f1117; --card:#1a1d27; --fg:#e6e8ee; --muted:#9aa0ad; --accent:#6c8cff; --border:#2a2e3a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
           background:var(--bg); color:var(--fg); line-height:1.5; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    header { border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; gap:1.5rem; align-items:center; }
    header .brand { font-weight:700; font-size:1.15rem; color:var(--fg); }
    header nav a { color:var(--muted); margin-right:1rem; }
    main { max-width:1000px; margin:0 auto; padding:2rem 1.5rem; }
    h1 { margin-top:0; }
    .muted { color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1rem 1.1rem; }
    .card h3 { margin:0 0 .4rem; font-size:1.05rem; }
    .search { display:flex; gap:.5rem; margin:1rem 0 1.5rem; }
    .search input { flex:1; padding:.6rem .8rem; border-radius:8px; border:1px solid var(--border);
                    background:var(--card); color:var(--fg); }
    .search button { padding:.6rem 1.1rem; border-radius:8px; border:0; background:var(--accent); color:#fff; cursor:pointer; }
    .search select { padding:.6rem .8rem; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--fg); }
    .category-group { margin:0 0 2rem; }
    .category-heading { font-size:1.1rem; margin:1.5rem 0 .75rem; padding-bottom:.35rem; border-bottom:1px solid var(--border); }
    .category-heading .count { color:var(--muted); font-weight:400; font-size:.9rem; }
    .about { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1rem 1.1rem; margin:1rem 0; }
    .chips { display:flex; flex-wrap:wrap; gap:.4rem; list-style:none; padding:0; margin:.5rem 0 1.5rem; }
    .chips .chip { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:.25rem .75rem; font-size:.85rem; color:var(--fg); }
    .stats { display:flex; gap:1.5rem; margin-bottom:1rem; }
    .pill { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:.2rem .7rem; font-size:.85rem; color:var(--muted); }
    .empty { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .meta { margin:.5rem 0; font-size:.9rem; }
    .meta div { margin:.15rem 0; }
    .source-tag { display:inline-block; background:var(--card); border:1px solid var(--border);
                  border-radius:6px; padding:.1rem .5rem; font-size:.75rem; color:var(--muted); }
    #venue-map { height:380px; border-radius:10px; border:1px solid var(--border); margin:1rem 0 1.5rem; }
    .leaflet-popup-content a { color:#1a4cff; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <span class="brand">Veent Events</span>
    <nav>
      <a href="{% url 'events:event_list' %}">Events</a>
      <a href="{% url 'events:venue_list' %}">Venues</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block extra_body %}{% endblock %}
</body>
</html>
